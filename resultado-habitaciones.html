<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu Diagnóstico · Espazio con Propósito</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --blanco:       #FDFAF5;
  --crema:        #F5EDD8;
  --crema2:       #EDE0C4;
  --teal:         #2D7A7A;
  --teal-claro:   #3D9999;
  --teal-pale:    #EAF4F4;
  --dorado:       #C8913A;
  --dorado-claro: #E8C98A;
  --terracota:    #C4613A;
  --texto:        #2A2018;
  --texto-suave:  #7A6A58;
  --borde:        rgba(200,145,58,0.18);
  --borde-teal:   rgba(45,122,122,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body { background:var(--blanco); color:var(--texto); font-family:'Jost',sans-serif; font-weight:300; min-height:100vh; overflow-x:hidden; }
body::before { content:''; position:fixed; inset:0; background: radial-gradient(ellipse 70% 50% at 0% 0%, rgba(45,122,122,0.06) 0%,transparent 55%), radial-gradient(ellipse 60% 40% at 100% 100%,rgba(196,97,58,0.05) 0%,transparent 55%); pointer-events:none; z-index:0; }

.contenedor { position:relative; z-index:1; max-width:700px; margin:0 auto; padding:0 24px 100px; }

.header { text-align:center; padding:44px 0 36px; border-bottom:0.5px solid var(--borde); margin-bottom:48px; }
.logo-wrap { width:64px; height:64px; margin:0 auto 14px; animation:flotar 6s ease-in-out infinite; }
.logo-wrap img { width:100%; height:100%; object-fit:contain; }
@keyframes flotar { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-5px);} }
.marca { font-family:'Cormorant Garamond',serif; font-size:12px; letter-spacing:0.38em; text-transform:uppercase; color:var(--texto-suave); }

/* HERO RESULTADO */
.res-hero { background:#fff; border:0.5px solid var(--borde); border-radius:20px; padding:44px 40px 36px; position:relative; overflow:hidden; margin-bottom:24px; box-shadow:0 2px 28px rgba(42,32,24,0.05); animation:entrar 0.5s cubic-bezier(.4,0,.2,1) both; }
@keyframes entrar { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }
.res-hero::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; opacity:0.7; }
.acumulacion .res-hero::before { background:linear-gradient(90deg,#C4613A,#E8A070,#C4613A); }
.bloqueo     .res-hero::before { background:linear-gradient(90deg,#2D7A7A,#7BC8C8,#2D7A7A); }
.desconexion .res-hero::before { background:linear-gradient(90deg,#5C7A2D,#9ABE5C,#5C7A2D); }
.equilibrio  .res-hero::before { background:linear-gradient(90deg,#C8913A,#E8C98A,#C8913A); }

.res-icono { font-size:52px; text-align:center; margin-bottom:20px; display:block; }
.res-tipo { font-size:11px; font-weight:500; letter-spacing:0.3em; text-transform:uppercase; color:var(--teal-claro); margin-bottom:10px; display:block; text-align:center; }
.res-titulo { font-family:'Cormorant Garamond',serif; font-size:clamp(28px,5vw,40px); font-weight:300; line-height:1.2; color:var(--texto); margin-bottom:18px; text-align:center; }
.res-titulo em { font-style:italic; color:var(--teal); }
.acumulacion .res-titulo em { color:var(--terracota); }
.desconexion .res-titulo em { color:#5C7A2D; }
.equilibrio  .res-titulo em { color:var(--dorado); }
.res-desc { font-size:15px; line-height:1.85; color:var(--texto-suave); margin-bottom:0; }
.res-desc strong { color:var(--texto); font-weight:500; }

/* SECCIÓN ACCIONES */
.acciones-seccion { margin-bottom:24px; animation:entrar 0.5s 0.1s cubic-bezier(.4,0,.2,1) both; }
.sec-eyebrow { font-size:11px; font-weight:500; letter-spacing:0.28em; text-transform:uppercase; color:var(--teal); margin-bottom:20px; display:flex; align-items:center; gap:10px; }
.sec-eyebrow::after { content:''; flex:1; height:0.5px; background:linear-gradient(90deg,var(--teal),transparent); opacity:0.3; }
.sec-titulo { font-family:'Cormorant Garamond',serif; font-size:clamp(22px,4vw,30px); font-weight:300; line-height:1.3; color:var(--texto); margin-bottom:24px; }
.sec-titulo em { font-style:italic; color:var(--teal); }

/* HABITACIONES CON ACCIONES */
.hab-card { background:#fff; border:0.5px solid var(--borde); border-radius:16px; padding:28px 32px; margin-bottom:16px; box-shadow:0 2px 16px rgba(42,32,24,0.04); }
.hab-card-header { display:flex; align-items:center; gap:14px; margin-bottom:18px; }
.hab-icono { font-size:28px; flex-shrink:0; }
.hab-nombre { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:400; color:var(--texto); }
.hab-nombre em { font-style:italic; color:var(--teal); }
.acciones-lista { list-style:none; }
.accion-item { display:flex; align-items:flex-start; gap:14px; padding:12px 0; border-bottom:0.5px solid rgba(45,122,122,0.08); }
.accion-item:last-child { border-bottom:none; padding-bottom:0; }
.accion-num { flex-shrink:0; width:26px; height:26px; border-radius:50%; background:var(--teal-pale); border:0.5px solid var(--borde-teal); display:flex; align-items:center; justify-content:center; font-family:'Cormorant Garamond',serif; font-size:14px; color:var(--teal); margin-top:1px; }
.accion-contenido {}
.accion-titulo { font-size:14px; font-weight:500; color:var(--texto); margin-bottom:3px; }
.accion-desc { font-size:13px; line-height:1.65; color:var(--texto-suave); }

/* RECORDATORIO */
.recordatorio { background:var(--crema); border:0.5px solid var(--borde); border-radius:16px; padding:28px 32px; margin-bottom:24px; text-align:center; position:relative; }
.comilla { font-family:'Cormorant Garamond',serif; font-size:56px; line-height:0.5; color:var(--dorado-claro); opacity:0.5; position:absolute; top:18px; left:22px; }
.recordatorio-texto { font-family:'Cormorant Garamond',serif; font-size:18px; font-style:italic; font-weight:300; line-height:1.6; color:var(--texto); position:relative; z-index:1; }

/* CTA */
.cta-final { background:#fff; border:0.5px solid var(--borde); border-radius:20px; padding:44px 40px; text-align:center; position:relative; overflow:hidden; box-shadow:0 4px 32px rgba(42,32,24,0.06); animation:entrar 0.5s 0.2s cubic-bezier(.4,0,.2,1) both; }
.cta-final::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--teal),var(--dorado),var(--terracota)); opacity:0.6; }
.cta-eyebrow { font-size:11px; font-weight:500; letter-spacing:0.28em; text-transform:uppercase; color:var(--dorado); margin-bottom:14px; }
.cta-titulo { font-family:'Cormorant Garamond',serif; font-size:clamp(22px,4vw,32px); font-weight:300; line-height:1.25; color:var(--texto); margin-bottom:14px; }
.cta-titulo em { font-style:italic; color:var(--teal); }
.cta-texto { font-size:14px; line-height:1.75; color:var(--texto-suave); max-width:440px; margin:0 auto 28px; }
.chips { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin-bottom:28px; }
.chip { background:var(--teal-pale); border:0.5px solid var(--borde-teal); border-radius:99px; padding:7px 16px; font-size:12px; color:var(--teal); }
.btn-cta { display:inline-flex; align-items:center; gap:10px; padding:17px 40px; background:var(--teal); color:#fff; border:none; border-radius:12px; font-family:'Jost',sans-serif; font-size:13px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; transition:all 0.22s ease; text-decoration:none; }
.btn-cta:hover { background:var(--teal-claro); transform:translateY(-2px); box-shadow:0 8px 24px rgba(45,122,122,0.28); }
.cta-sub { font-size:12px; color:var(--texto-suave); margin-top:14px; opacity:0.7; }

.ornamento { display:flex; align-items:center; justify-content:center; gap:14px; margin:28px 0; opacity:0.35; }
.ornamento::before,.ornamento::after { content:''; flex:1; max-width:70px; height:0.5px; }
.ornamento::before { background:linear-gradient(90deg,transparent,var(--dorado)); }
.ornamento::after  { background:linear-gradient(270deg,transparent,var(--dorado)); }
.rombo { width:5px; height:5px; background:var(--dorado); transform:rotate(45deg); }

.flecha { display:inline-block; animation:moverFlecha 1.6s ease-in-out infinite; }
@keyframes moverFlecha { 0%,100%{transform:translateX(0);} 50%{transform:translateX(4px);} }

.footer { text-align:center; padding:40px 0 24px; border-top:0.5px solid var(--borde); opacity:0.4; }
.footer p { font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:var(--texto-suave); line-height:1.8; }

@media(max-width:520px) { .res-hero{padding:32px 24px 28px;} .hab-card{padding:22px 20px;} .cta-final{padding:32px 20px;} }
</style>
</head>
<body>

// ── CARGAR RESULTADO ──
function cargarResultado() {
  const params = new URLSearchParams(window.location.search);
  const diag = params.get('diagnostico')
    || sessionStorage.getItem('diagnosticoHab')
    || localStorage.getItem('diagnosticoHab')
    || 'bloqueo';

  const data = diagnosticos[diag] || diagnosticos['bloqueo'];
  const wrap = document.getElementById('resultado-wrap');
  document.getElementById('main-contenedor').classList.add(data.clase);

  let habitacionesHTML = data.habitaciones.map(hab => {
    const accionesHTML = hab.acciones.map((a, i) => `
      <li class="accion-item">
        <div class="accion-num">${i+1}</div>
        <div class="accion-contenido">
          <p class="accion-titulo">${a.titulo}</p>
          <p class="accion-desc">${a.desc}</p>
        </div>
      </li>`).join('');

    return `
      <div class="hab-card">
        <div class="hab-card-header">
          <span class="hab-icono">${hab.icono}</span>
          <h4 class="hab-nombre">${hab.nombre}</h4>
